<script src="polyfills.js" type="module"></script><script src="scripts.js" defer></script><script src="main.js" type="module"></script>  <script>
  (function () {
    function closeModal(modal) {
      if (!modal) return;
      modal.classList.remove('show');
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      modal.removeAttribute('aria-modal');
      document.body.classList.remove('modal-open');
      document.querySelectorAll('.docs-modal-backdrop').forEach(function (node) { node.remove(); });
      var content = modal.querySelector('.modal-content');
      var body = modal.querySelector('.modal-body');
      if (content) {
        content.style.paddingBottom = '';
        content.style.overflow = '';
      }
      if (body) {
        body.style.paddingBottom = '';
        body.style.overflow = '';
      }
    }

    function openModal(modal) {
      if (!modal) return;
      modal.style.display = 'block';
      modal.classList.add('show');
      modal.removeAttribute('aria-hidden');
      modal.setAttribute('aria-modal', 'true');
      document.body.classList.add('modal-open');
      var content = modal.querySelector('.modal-content');
      var body = modal.querySelector('.modal-body');
      if (content) {
        content.style.paddingBottom = '13rem';
        content.style.overflow = 'visible';
      }
      if (body) {
        body.style.paddingBottom = '13rem';
        body.style.overflow = 'visible';
      }

      if (!document.querySelector('.docs-modal-backdrop')) {
        var backdrop = document.createElement('div');
        backdrop.className = 'modal-backdrop fade show docs-modal-backdrop';
        backdrop.addEventListener('click', function () { closeModal(modal); });
        document.body.appendChild(backdrop);
      }
    }

    document.addEventListener('click', function (event) {
      var openTrigger = event.target.closest('[data-bs-toggle="modal"]');
      if (openTrigger) {
        event.preventDefault();
        openModal(document.querySelector(openTrigger.getAttribute('data-bs-target')));
        return;
      }

      var closeTrigger = event.target.closest('[data-bs-dismiss="modal"]');
      if (closeTrigger) {
        event.preventDefault();
        closeModal(closeTrigger.closest('.modal'));
      }
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') {
        closeModal(document.querySelector('.modal.show'));
      }
    });
  })();
</script>
